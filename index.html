<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>탄막 피하기 게임</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="game-wrapper">
    <h1>탄막 피하기</h1>

    <div class="info">
      <span>난이도: <strong id="levelText">1</strong></span>
      <span>피한 총알: <strong id="scoreText">0</strong>개</span>
      <span>다음 난이도: <strong id="nextLevelText">10</strong>개</span>
    </div>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <div class="controls">
      <p>조작: WASD 또는 방향키</p>
      <button id="startBtn">게임 시작</button>
      <button id="restartBtn">다시 시작</button>
      <button id="soundBtn">사운드 ON</button>
    </div>

    <div id="message">게임 시작 버튼을 누르세요</div>

    <div id="nameInputBox" class="name-box hidden">
      <input type="text" id="nicknameInput" placeholder="닉네임 입력" maxlength="10" />
      <button id="saveRankBtn">기록 저장</button>
    </div>

    <section class="ranking-box">
      <h2>랭킹 TOP 10</h2>
      <ol id="rankingList"></ol>
      <button id="clearRankBtn">기록 초기화</button>
    </section>
  </div>

  <script src="./script.js"></script>
</body>
</html>
